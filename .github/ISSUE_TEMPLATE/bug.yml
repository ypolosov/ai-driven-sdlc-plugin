name: Баг
description: Сообщить о некорректном поведении плагина
title: "[bug] "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Версия плагина
      description: Из `.claude-plugin/plugin.json` или `/plugin list`.
      placeholder: "0.1.2"
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Команда или skill
      description: Что вы запускали в момент бага.
      placeholder: "/sdlc-phase testing"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно было произойти.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: Что произошло вместо ожидаемого.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Шаги воспроизведения
      description: Минимальная последовательность для повторения.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Окружение
      description: OS, версия Claude Code, bash/shell.
      placeholder: "Ubuntu 24.04, Claude Code 1.x, bash 5.2"
